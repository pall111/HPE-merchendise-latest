openapi: 3.1.0
info:
  title: NITTE Merchandise Shop API
  description: |
    # NITTE Merchandise Shop - API Gateway v1
    
    Production-grade e-commerce microservices API providing authentication, product management, 
    shopping cart, and order processing capabilities.
    
    ## Key Features
    - User authentication (JWT-based)
    - Guest and authenticated user separation
    - Product catalog with filtering
    - Shopping cart management
    - Order creation and tracking
    - Role-based access control (RBAC)
    - Admin policy management
    
    ## Authentication
    This API uses JWT Bearer tokens for authentication:
    - Obtain tokens via `/auth/login` or `/auth/signup`
    - Include token in `Authorization: Bearer <token>` header
    - Refresh tokens: Use `/auth/refresh` when access token expires
    - Some endpoints are publicly accessible (no auth required)
    
    ## Guest vs Authenticated Access
    - **Guest users**: Can view active products only (policy-enforced)
    - **Authenticated users**: Full access to features including cart, checkout, order history
    - **Admin users**: Product management, policy management, view all orders
    
    ## API Versioning
    - Current version: v1
    - All endpoints prefixed with `/api/v1`
    - Future versions will use `/api/v2`, etc.
    
    ## Response Format
    All endpoint responses follow a consistent structure:
    ```json
    {
      "success": true,
      "message": "Operation successful",
      "data": {},
      "errors": []
    }
    ```
    
    ## Error Handling
    - **400**: Validation error - check `errors` array for details
    - **401**: Authentication required or invalid token
    - **403**: Permission denied - insufficient role/permissions
    - **404**: Resource not found
    - **422**: Business logic validation failed (e.g., stock unavailable)
    - **500**: Server error
    
    ## Rate Limiting
    Standard rate limits apply: 10,000 requests per 15-minute window
    (higher limits for authenticated requests in development/testing)
    
  version: "1.0.0"
  contact:
    name: NITTE Admin
    email: admin@nitte-merch-shop.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Local Development
  - url: https://api.nitte-merch-shop.com/api/v1
    description: Production

security:
  - BearerAuth: []
  - {}  # Allow unauthenticated access for public endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token. 
        Format: `Bearer <token>`
        Obtained from /auth/login or /auth/signup
        Valid for 1 hour; use /auth/refresh to renew

paths:
  # ==================== Authentication ====================
  /auth/signup:
    $ref: './paths/auth.yaml#/~=/auth~=/signup'

  /auth/login:
    $ref: './paths/auth.yaml#/~=/auth~=/login'

  /auth/logout:
    $ref: './paths/auth.yaml#/~=/auth~=/logout'

  /auth/refresh:
    $ref: './paths/auth.yaml#/~=/auth~=/refresh'

  /auth/me:
    $ref: './paths/auth.yaml#/~=/auth~=/me'

  # ==================== Products ====================
  /products:
    $ref: './paths/products.yaml#/~=/products'

  /products/{id}:
    $ref: './paths/products.yaml#/~=/products~=/{id}'

  # ==================== Orders ====================
  /orders:
    $ref: './paths/orders.yaml#/~=/orders'

  /orders/{id}:
    $ref: './paths/orders.yaml#/~=/orders~=/{id}'

  # ==================== Admin Policies ====================
  /admin/policies:
    $ref: './paths/admin.yaml#/~=/admin~=/policies'

  /admin/policies/{id}:
    $ref: './paths/admin.yaml#/~=/admin~=/policies~=/{id}'
  
  # ==================== Admin Users ====================
  /admin/users/unverified:
    $ref: './paths/admin_users.yaml#/~=/admin~=/users~=/unverified'
  
  /admin/users/{user_id}/verification:
    $ref: './paths/admin_users.yaml#/~=/admin~=/users~=/{user_id}~=/verification'
  
  /admin/users/{user_id}/approve:
    $ref: './paths/admin_users.yaml#/~=/admin~=/users~=/{user_id}~=/approve'
  
  /admin/users/{user_id}/reject:
    $ref: './paths/admin_users.yaml#/~=/admin~=/users~=/{user_id}~=/reject'
  
  /admin/users/stats/verification:
    $ref: './paths/admin_users.yaml#/~=/admin~=/users~=/stats~=/verification'

tags:
  - name: Authentication
    description: User login, registration, and token management
  - name: Products
    description: Product catalog and management (listing, details, admin CRUD)
  - name: Orders
    description: Order creation, tracking, and history
  - name: Admin Policies
    description: Role-based access control and policy management (admin only)
  - name: Admin User Management
    description: Alumni user verification and approval workflow (admin only)

# Components (Schemas)
# Imported from schemas/schemas.yaml when expanded
