User:
  type: object
  required:
    - userId
    - email
    - name
    - role
  properties:
    userId:
      type: string
      description: Unique user identifier
      example: "507f1f77bcf86cd799439011"
    email:
      type: string
      format: email
      description: User email address
      example: "user@example.com"
    name:
      type: string
      description: User full name
      example: "John Doe"
    role:
      type: string
      enum: [user, admin]
      description: User role
      example: "user"

UserSignupRequest:
  type: object
  required:
    - email
    - password
    - name
  properties:
    email:
      type: string
      format: email
      description: User email address
      example: "newuser@example.com"
    password:
      type: string
      minLength: 6
      description: User password (minimum 6 characters)
      example: "SecurePassword123"
    name:
      type: string
      description: User full name
      example: "Jane Doe"

UserLoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      description: User email address
      example: "user@example.com"
    password:
      type: string
      description: User password
      example: "SecurePassword123"

AuthTokens:
  type: object
  required:
    - access_token
    - refresh_token
  properties:
    access_token:
      type: string
      description: JWT access token (valid for 1 hour)
      example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    refresh_token:
      type: string
      description: JWT refresh token (valid for 30 days)
      example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

Product:
  type: object
  required:
    - id
    - name
    - description
    - category
    - price
    - stock
    - created_at
    - updated_at
  properties:
    id:
      type: string
      description: Product unique identifier (MongoDB ObjectId)
      example: "507f1f77bcf86cd799439011"
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: Product name
      example: "NITTE T-Shirt"
    description:
      type: string
      minLength: 1
      description: Product description
      example: "Premium quality NITTE merchandise t-shirt"
    category:
      type: string
      minLength: 1
      maxLength: 100
      description: Product category
      example: "clothing"
    price:
      type: number
      format: float
      minimum: 0
      exclusiveMinimum: true
      description: Product price in INR
      example: 499.99
    stock:
      type: integer
      minimum: 0
      description: Available stock quantity
      example: 100
    image_url:
      type: string
      format: uri
      nullable: true
      description: Product image URL
      example: "https://example.com/images/tshirt.jpg"
    status:
      type: string
      enum: [active, archived]
      description: Product visibility status
      example: "active"
    created_at:
      type: string
      format: date-time
      description: Product creation timestamp
      example: "2024-01-01T10:00:00Z"
    updated_at:
      type: string
      format: date-time
      description: Product last update timestamp
      example: "2024-01-15T14:30:00Z"

ProductCreateRequest:
  type: object
  required:
    - name
    - description
    - category
    - price
    - stock
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
      example: "NITTE Hoodie"
    description:
      type: string
      minLength: 1
      example: "Premium NITTE hoodie with embroidered logo"
    category:
      type: string
      minLength: 1
      maxLength: 100
      example: "clothing"
    price:
      type: number
      format: float
      minimum: 0
      exclusiveMinimum: true
      example: 799.99
    stock:
      type: integer
      minimum: 0
      example: 50
    image_url:
      type: string
      format: uri
      nullable: true
      example: "https://example.com/images/hoodie.jpg"

ProductUpdateRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
    description:
      type: string
      minLength: 1
    category:
      type: string
      minLength: 1
      maxLength: 100
    price:
      type: number
      format: float
      minimum: 0
      exclusiveMinimum: true
    stock:
      type: integer
      minimum: 0
    image_url:
      type: string
      format: uri
      nullable: true
    status:
      type: string
      enum: [active, archived]

CartItem:
  type: object
  required:
    - product_id
    - quantity
    - price
  properties:
    product_id:
      type: string
      description: Product ID
      example: "507f1f77bcf86cd799439011"
    quantity:
      type: integer
      minimum: 1
      description: Item quantity
      example: 2
    price:
      type: number
      format: float
      description: Price at time of adding to cart
      example: 499.99

Order:
  type: object
  required:
    - id
    - order_id
    - user_id
    - user_email
    - items
    - shipping_address
    - status
    - created_at
  properties:
    id:
      type: string
      description: Order unique identifier (MongoDB ObjectId)
      example: "507f1f77bcf86cd799439012"
    order_id:
      type: string
      description: Human-readable order identifier
      example: "ORD-00001"
    user_id:
      type: string
      description: User who placed the order
      example: "507f1f77bcf86cd799439011"
    user_email:
      type: string
      format: email
      description: User email at time of order
      example: "user@example.com"
    items:
      type: array
      items:
        $ref: "#/components/schemas/CartItem"
      description: Order items
    shipping_address:
      type: string
      description: Shipping address
      example: "123 Main St, City, State 12345"
    notes:
      type: string
      nullable: true
      description: Order notes
      example: "Please deliver in the morning"
    status:
      type: string
      enum: [pending, processing, shipped, delivered, cancelled]
      description: Order status
      example: "pending"
    created_at:
      type: string
      format: date-time
      example: "2024-01-20T10:00:00Z"
    updated_at:
      type: string
      format: date-time
      nullable: true
      example: "2024-01-21T15:30:00Z"

OrderCreateRequest:
  type: object
  required:
    - items
    - shipping_address
  properties:
    items:
      type: array
      minItems: 1
      items:
        $ref: "#/components/schemas/CartItem"
    shipping_address:
      type: string
      minLength: 5
      example: "Flat 101, Tower A, Mumbai, MH 400001"
    notes:
      type: string
      nullable: true
      example: "Please handle with care"

Policy:
  type: object
  required:
    - id
    - name
    - type
    - actions
    - effect
    - enabled
  properties:
    id:
      type: string
      description: Policy unique identifier
      example: "product-visibility"
    name:
      type: string
      description: Human-readable policy name
      example: "Product Visibility Policy"
    type:
      type: string
      enum: [attribute, action, conditional]
      description: Policy type
    actions:
      type: array
      items:
        type: string
      description: Actions this policy applies to
      example: ["list_products", "view_product"]
    effect:
      type: string
      enum: [allow, deny]
      description: Policy effect
    rules:
      type: array
      items:
        type: object
        properties:
          condition:
            type: string
            description: Condition expression
          context:
            type: string
            enum: [guest, authenticated, admin]
          priority:
            type: integer
      description: Policy rules
    enabled:
      type: boolean
      description: Whether policy is active
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

PolicyCreateRequest:
  type: object
  required:
    - name
    - type
    - actions
    - effect
  properties:
    name:
      type: string
      example: "Product Visibility Policy"
    type:
      type: string
      enum: [attribute, action, conditional]
    actions:
      type: array
      items:
        type: string
      example: ["list_products", "view_product"]
    effect:
      type: string
      enum: [allow, deny]
    rules:
      type: array
      items:
        type: object
    enabled:
      type: boolean
      default: true

SuccessResponse:
  type: object
  required:
    - success
  properties:
    success:
      type: boolean
      example: true
    message:
      type: string
      example: "Operation successful"
    data:
      type: object
      nullable: true
    timestamps:
      type: string
      format: date-time
      nullable: true

ErrorResponse:
  type: object
  required:
    - success
    - message
  properties:
    success:
      type: boolean
      example: false
    message:
      type: string
      description: Error message
      example: "Validation failed"
    errors:
      type: array
      nullable: true
      items:
        type: object
        properties:
          field:
            type: string
          message:
            type: string
    details:
      type: object
      nullable: true

UserVerification:
  type: object
  description: User verification record for alumni approval workflow
  properties:
    _id:
      type: string
      description: MongoDB document ID
      example: "507f1f77bcf86cd799439011"
    user_id:
      type: string
      description: Keycloak user ID
      example: "abc123xyz"
    email:
      type: string
      format: email
      description: User email address
      example: "alumni@example.com"
    name:
      type: string
      description: User full name
      example: "John Doe"
    alumni_id:
      type: string
      description: Alumni or student ID
      example: "ALM2020001"
    department:
      type: string
      description: Department or faculty
      example: "Computer Science"
      nullable: true
    graduation_year:
      type: integer
      description: Year of graduation
      example: 2020
      nullable: true
    status:
      type: string
      enum: [pending, approved, rejected]
      description: Verification status
      example: "pending"
    registration_timestamp:
      type: string
      format: date-time
      description: When the user registered
      example: "2024-01-15T10:30:00Z"
    approved_by:
      type: string
      description: Admin who approved the user
      example: "admin@nitte.com"
      nullable: true
    approval_timestamp:
      type: string
      format: date-time
      description: When user was approved
      example: "2024-01-20T14:00:00Z"
      nullable: true
    approval_reason:
      type: string
      description: Reason for approval
      example: "Verified alumni credentials"
      nullable: true
    rejected_by:
      type: string
      description: Admin who rejected the user
      example: "admin@nitte.com"
      nullable: true
    rejection_timestamp:
      type: string
      format: date-time
      description: When user was rejected
      example: "2024-01-20T14:30:00Z"
      nullable: true
    rejection_reason:
      type: string
      description: Reason for rejection
      example: "Alumni ID could not be verified"
      nullable: true
    events:
      type: array
      description: Event history
      items:
        type: object
        properties:
          type:
            type: string
            enum: [registered, approved, rejected, resubmitted]
            example: "registered"
          timestamp:
            type: string
            format: date-time
            example: "2024-01-15T10:30:00Z"
          actor:
            type: string
            description: User or admin who triggered the event
            example: "system"
          reason:
            type: string
            description: Optional reason
            example: "User initiated registration"
            nullable: true

UserApprovalRequest:
  type: object
  description: Request to approve a user registration
  properties:
    approval_reason:
      type: string
      maxLength: 500
      description: Optional reason for approval
      example: "Verified as alumni member"

UserRejectionRequest:
  type: object
  required:
    - rejection_reason
  description: Request to reject a user registration
  properties:
    rejection_reason:
      type: string
      maxLength: 500
      description: Reason for rejection
      example: "Alumni ID could not be verified"
