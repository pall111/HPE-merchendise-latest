# Standardized Error Response Schemas
# Used across all API endpoints for consistency

components:
  responses:
    '400_BadRequest':
      description: Bad Request - Validation failed or malformed request
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
                example: "Validation failed"
              errors:
                type: object
                example:
                  email: "Email is invalid"
                  password: "Password must be at least 8 characters"
              code:
                type: string
                example: "VALIDATION_ERROR"
              timestamp:
                type: string
                format: date-time

    '401_Unauthorized':
      description: Unauthorized - Missing or invalid authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
                example: "Unauthorized - Invalid or expired token"
              code:
                type: string
                enum: ["INVALID_TOKEN", "TOKEN_EXPIRED", "NO_AUTH_HEADER"]
              timestamp:
                type: string
                format: date-time

    '403_Forbidden':
      description: Forbidden - User lacks required permissions or role
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
                example: "Forbidden - Insufficient permissions"
              code:
                type: string
                enum: ["INSUFFICIENT_ROLE", "POLICY_DENIED", "RESOURCE_ACCESS_DENIED"]
              requiredRole:
                type: string
                example: "admin"
              timestamp:
                type: string
                format: date-time

    '404_NotFound':
      description: Not Found - Resource doesn't exist
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
                example: "Resource not found"
              code:
                type: string
                example: "RESOURCE_NOT_FOUND"
              resourceId:
                type: string
                example: "507f1f77bcf86cd799439011"
              timestamp:
                type: string
                format: date-time

    '422_UnprocessableEntity':
      description: Unprocessable Entity - Business logic validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
                example: "Cannot process checkout - item out of stock"
              code:
                type: string
                enum: ["OUT_OF_STOCK", "INVALID_COUPON", "CART_EMPTY", "DUPLICATE_ITEM"]
              details:
                type: object
                example:
                  product_id: "507f1f77bcf86cd799439011"
                  reason: "Out of stock"
              timestamp:
                type: string
                format: date-time

    '500_InternalServerError':
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
                example: "Internal server error"
              code:
                type: string
                example: "INTERNAL_SERVER_ERROR"
              requestId:
                type: string
                description: "Unique ID for debugging and support"
              timestamp:
                type: string
                format: date-time

    '503_ServiceUnavailable':
      description: Service Unavailable - Upstream service down
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
                example: "Service temporarily unavailable"
              code:
                type: string
                example: "SERVICE_UNAVAILABLE"
              affectedServices:
                type: array
                items:
                  type: string
                example: ["python_service", "mongodb"]
              retryAfter:
                type: integer
                example: 30
              timestamp:
                type: string
                format: date-time
