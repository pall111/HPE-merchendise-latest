global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: nitte-shop
    environment: docker

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['node-backend:3000']
        labels:
          service: node-backend

  - job_name: python-service
    metrics_path: /metrics
    static_configs:
      - targets: ['python-service:8000']
        labels:
          service: python-service

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ['notification-service:9100']
        labels:
          service: notification-service
