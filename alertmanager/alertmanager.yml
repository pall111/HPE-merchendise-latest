global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: default
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: default
      repeat_interval: 3h

receivers:
  - name: default

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
