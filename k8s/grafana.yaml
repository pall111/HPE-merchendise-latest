apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: nitte
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
      - name: wait-for-prometheus
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z prometheus 9090; do echo "waiting for prometheus"; sleep 2; done']
      - name: wait-for-loki
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z loki 3100; do echo "waiting for loki"; sleep 2; done']
      - name: wait-for-loki-rbac-proxy
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z loki-rbac-proxy 3200; do echo "waiting for loki-rbac-proxy"; sleep 2; done']
      containers:
      - name: grafana
        image: grafana/grafana:10.2.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: GF_SECURITY_ADMIN_PASSWORD
        - name: GF_SERVER_ROOT_URL
          value: "http://localhost:3001"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_AUTH_GENERIC_OAUTH_ENABLED
          value: "true"
        - name: GF_AUTH_GENERIC_OAUTH_NAME
          value: "Keycloak"
        - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
          value: "true"
        - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
          value: "grafana-client"
        - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
          value: "grafana-client-secret"
        - name: GF_AUTH_GENERIC_OAUTH_SCOPES
          value: "openid profile email roles"
        - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
          value: "http://localhost:8080/realms/nitte-realm/protocol/openid-connect/auth"
        - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
          value: "http://keycloak:8080/realms/nitte-realm/protocol/openid-connect/token"
        - name: GF_AUTH_GENERIC_OAUTH_API_URL
          value: "http://keycloak:8080/realms/nitte-realm/protocol/openid-connect/userinfo"
        - name: GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH
          value: "preferred_username"
        - name: GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH
          value: "name"
        - name: GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH
          value: "email"
        - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
          value: "contains(realm_access.roles[*], 'admin-internal') && 'Admin' || contains(realm_access.roles[*], 'keycloak-admin') && 'Admin' || contains(realm_access.roles[*], 'internal-user') && 'Editor' || 'Viewer'"
        - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT_MODE
          value: "false"
        - name: GF_AUTH_GENERIC_OAUTH_SKIP_ORG_ROLE_SYNC
          value: "false"
        - name: GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP
          value: "true"
        - name: GF_USERS_AUTO_ASSIGN_ORG_ROLE
          value: "Viewer"
        - name: GF_AUTH_SIGNOUT_REDIRECT_URL
          value: "http://localhost:8080/realms/nitte-realm/protocol/openid-connect/logout?post_logout_redirect_uri=http://localhost:3001"
        volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
          readOnly: true
        - name: grafana-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
          readOnly: true
        - name: grafana-data
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
      volumes:
      - name: grafana-datasources
        configMap:
          name: grafana-datasources-config
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards-config
      - name: grafana-data
        persistentVolumeClaim:
          claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: nitte
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
