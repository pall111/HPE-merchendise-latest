apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All workload manifests for the NITTE platform (one full stack).
# ConfigMaps and Secrets are bootstrapped out-of-band (not managed here).
resources:
  - pvcs.yaml
  - mongodb.yaml
  - kafka.yaml
  - keycloak.yaml
  - minio.yaml
  - minio-init.yaml
  - node-backend.yaml
  - python-service.yaml
  - frontend.yaml
  - admin-dashboard.yaml
  - merchant-portal.yaml
  - notification-service.yaml
  - prometheus.yaml
  - grafana.yaml
  - alertmanager.yaml
  - loki.yaml
  - promtail-rbac.yaml
  - promtail.yaml
  - loki-rbac-proxy.yaml
  - jaeger.yaml

# Rewrite local image names to the Nexus registry
images:
  - name: node-backend
    newName: 192.168.56.10:30082/node-backend
    newTag: "1.0.1"
  - name: python-service
    newName: 192.168.56.10:30082/python-service
  - name: frontend
    newName: 192.168.56.10:30082/frontend
  - name: admin-dashboard
    newName: 192.168.56.10:30082/admin-dashboard
  - name: merchant-portal
    newName: 192.168.56.10:30082/merchant-portal
    newTag: "1.0.1"
  - name: notification-service
    newName: 192.168.56.10:30082/notification-service
  - name: loki-rbac-proxy
    newName: 192.168.56.10:30082/loki-rbac-proxy

# Mount the correct nginx.conf (per app port) over the baked-in default
patches:
  - path: patch-frontend-nginx.yaml
    target:
      kind: Deployment
      name: frontend
  - path: patch-admin-nginx.yaml
    target:
      kind: Deployment
      name: admin-dashboard
  - path: patch-merchant-nginx.yaml
    target:
      kind: Deployment
      name: merchant-portal
