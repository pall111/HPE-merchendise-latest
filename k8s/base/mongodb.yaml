---
# ==================== Mongos Router ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: nitte
  labels:
    app: mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      initContainers:
      # Initiate config server replica set (stable DNS member), wait for primary
      - name: init-config-rs
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo nitte)
          CFG="mongo-config-0.mongo-config.${NS}.svc.cluster.local:27017"
          echo "Waiting for config server ($CFG)..."
          until mongosh --host "$CFG" --eval "db.runCommand({ping:1})" >/dev/null 2>&1; do
            echo "mongo-config not ready, retrying in 3s..."; sleep 3
          done
          echo "Initiating configRS with FQDN member..."
          mongosh --host "$CFG" --eval "try{ rs.initiate({_id:'configRS',configsvr:true,members:[{_id:0,host:'$CFG'}]}); print('configRS initiated'); }catch(e){ print('configRS: '+e.message); }"
          for i in $(seq 1 60); do
            mongosh --host "$CFG" --eval 'rs.status().myState' 2>/dev/null | grep -q "1" && { echo "configRS primary ready"; exit 0; }
            echo "waiting for configRS primary ($i/60)"; sleep 3
          done
          echo "configRS primary (or timeout — mongos will retry)"
      containers:
      - name: mongos
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command: ["mongos", "--configdb", "configRS/mongo-config-0.mongo-config:27017", "--port", "27017", "--bind_ip_all"]
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: nitte
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP

---
# ==================== MongoDB Init Job ====================
# Initializes replica sets (stable DNS members), adds shards, runs sharding-init.js
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init
  namespace: nitte
spec:
  backoffLimit: 5
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-init
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set +e
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo nitte)
          CFG="mongo-config-0.mongo-config.${NS}.svc.cluster.local:27017"
          S1="mongo-shard1-0.mongo-shard1.${NS}.svc.cluster.local:27018"
          S2="mongo-shard2-0.mongo-shard2.${NS}.svc.cluster.local:27019"
          echo "Namespace=$NS — using FQDN replica-set members"
          sleep 15

          echo "Initiating configRS..."
          mongosh --host "$CFG" --eval "try{ rs.initiate({_id:'configRS',configsvr:true,members:[{_id:0,host:'$CFG'}]}) }catch(e){ print('configRS: '+e.message) }"
          sleep 5

          echo "Initiating shard1..."
          mongosh --host "$S1" --eval "try{ rs.initiate({_id:'shard1',members:[{_id:0,host:'$S1'}]}) }catch(e){ print('shard1: '+e.message) }"
          sleep 5

          echo "Initiating shard2..."
          mongosh --host "$S2" --eval "try{ rs.initiate({_id:'shard2',members:[{_id:0,host:'$S2'}]}) }catch(e){ print('shard2: '+e.message) }"
          sleep 5

          echo "Adding shards via mongos..."
          mongosh --host mongodb:27017 --eval "try{ sh.addShard('shard1/$S1') }catch(e){ print('shard1 add: '+e.message) }; try{ sh.addShard('shard2/$S2') }catch(e){ print('shard2 add: '+e.message) }"
          sleep 3

          echo "Running sharding initialization script..."
          mongosh --host mongodb:27017 /scripts/sharding-init.js

          echo "MongoDB sharded cluster initialization complete!"
          exit 0
        volumeMounts:
        - name: sharding-init
          mountPath: /scripts/sharding-init.js
          subPath: sharding-init.js
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
      volumes:
      - name: sharding-init
        configMap:
          name: mongo-sharding-init-config
          items:
          - key: sharding-init.js
            path: sharding-init.js
