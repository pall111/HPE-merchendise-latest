# Namespaced ServiceAccount for Promtail (one per environment).
# The cluster-scoped ClusterRole/ClusterRoleBinding are managed separately
# (see k8s/cluster/promtail-clusterrbac.yaml) because they are global objects
# shared by all environments and must not be owned by a single overlay.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: nitte
