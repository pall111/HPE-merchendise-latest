# OWASP Coraza WAF as an Istio WasmPlugin on the ingress gateway.
# Runs inside the existing ingressgateway Envoy (no extra pods / memory).
# Applied out-of-band into istio-system (where the gateway pods live).
#
# Starts in DetectionOnly (logs attacks, blocks nothing) — flip the last
# directive to "SecRuleEngine On" to enforce/block once verified.
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: coraza-waf
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  url: oci://ghcr.io/corazawaf/coraza-proxy-wasm:0.5.0
  imagePullPolicy: IfNotPresent
  phase: AUTHN
  pluginConfig:
    directives_map:
      default:
        - "Include @recommended-conf"
        - "Include @crs-setup-conf"
        - "Include @owasp_crs/*.conf"
        # Disable the WAF for internal tooling/admin UIs (GraphQL/complex APIs that trip
        # CRS, and they're behind the SSH tunnel). The public app hosts (dev, prod,
        # admin.*, merchant.*) do NOT match this regex, so they stay fully protected.
        - 'SecRule REQUEST_HEADERS:Host "@rx ^(goalert|kiali|jenkins|grafana|prometheus|jaeger|minio|keycloak|redoc|argocd)\." "id:1000,phase:1,t:lowercase,pass,nolog,ctl:ruleEngine=Off"'
        - "SecRuleEngine On"
    default_directives: default
