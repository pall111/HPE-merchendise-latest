# Cluster-scoped RBAC for Promtail, shared across all environments.
# Applied once during bootstrap (NOT managed by the per-env ArgoCD apps,
# since cluster-scoped objects are global and cannot be owned by two overlays).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-clusterrole
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: nitte-dev
  - kind: ServiceAccount
    name: promtail
    namespace: nitte-prod
roleRef:
  kind: ClusterRole
  name: promtail-clusterrole
  apiGroup: rbac.authorization.k8s.io
