# GitOps demo workload — a tiny nginx that runs anywhere (no nodeSelector),
# so it stays Healthy on the single mastervm node. ArgoCD app `nitte-demo`
# (see k8s/demo/README below) watches this path and auto-syncs on every push.
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    istio-injection: disabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo
  namespace: demo
  labels: { app: gitops-demo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: gitops-demo }
  template:
    metadata:
      labels: { app: gitops-demo }
    spec:
      containers:
        - name: web
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
          resources:
            requests: { memory: "32Mi", cpu: "20m" }
            limits:   { memory: "64Mi", cpu: "100m" }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-demo
  namespace: demo
spec:
  selector: { app: gitops-demo }
  ports:
    - port: 80
      targetPort: 8080
