# Declarative ArgoCD external-cluster registration (Admin cluster / mastervm).
#
# Use this to "link" a standalone Dev or Prod single-node cluster into the Admin
# ArgoCD WITHOUT the argocd CLI. Copy this file, fill in the placeholders, and apply
# on the Admin cluster. Then point the matching Application's destination.server at the
# same `server` URL (see k8s/argocd/applications.yaml).
#
# DO NOT COMMIT a filled-in copy — it contains a bearer token. Apply it out-of-band
# (like passwords.txt / the other Secrets) and keep only this template in Git.
#
# How to get the values from the TARGET (Dev/Prod) cluster:
#   1. Create a service account + token on the target cluster with cluster-admin:
#        kubectl create serviceaccount argocd-manager -n kube-system
#        kubectl create clusterrolebinding argocd-manager --clusterrole=cluster-admin \
#          --serviceaccount=kube-system:argocd-manager
#        kubectl create token argocd-manager -n kube-system --duration=8760h
#      -> this prints the <BEARER_TOKEN>.
#   2. <API_SERVER_URL>  = the target's API, e.g. https://192.168.56.11:6443
#   3. <CA_DATA_BASE64>  = base64 of the target's cluster CA cert. Quick option: set
#      "insecure": true in tlsClientConfig (lab only) and omit caData.
---
apiVersion: v1
kind: Secret
metadata:
  name: cluster-dev               # cluster-dev / cluster-prod
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: dev-cluster              # display name shown in the ArgoCD UI
  server: https://192.168.56.11:6443   # <API_SERVER_URL>
  config: |
    {
      "bearerToken": "<BEARER_TOKEN>",
      "tlsClientConfig": {
        "insecure": true
      }
    }
