---
# Kiali — Istio service-mesh console (cluster-wide, lives in istio-system).
# Exposed on a single, env-less host since it observes all namespaces.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kiali-routes
spec:
  hosts:
    - "kiali.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination:
            host: kiali.istio-system.svc.cluster.local
            port: { number: 20001 }
---
# Jenkins CI (lives in the `jenkins` namespace, Helm-installed). Cross-namespace route.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jenkins-routes
spec:
  hosts:
    - "jenkins.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination:
            host: jenkins.jenkins.svc.cluster.local
            port: { number: 8080 }
