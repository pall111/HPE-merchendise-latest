        - destination: { host: prometheus, port: { number: 9090 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jaeger-routes
spec:
  hosts:
    - "jaeger.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: jaeger, port: { number: 16686 } }
---
apiVersion: networking.istio.io/v1beta1
